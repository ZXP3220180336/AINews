name: Daily AI News Crawl

on:
  schedule:
    # Run at 8:00 AM UTC daily
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    # 必须加这个权限，否则无法部署 Pages
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Configure environment
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "TZ=UTC" >> $GITHUB_ENV

      - name: Run crawl for yesterday's news
        run: |
          # Calculate yesterday's date
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          echo "Crawling news for: $YESTERDAY"

          # Create data directories
          mkdir -p data/raw data/processed data/output

          # Run main pipeline (placeholder - we'll create this script next)
          python scripts/run_pipeline.py --date $YESTERDAY

          # List generated files
          find data/output -type f | head -10

      - name: Generate static site
        run: |
          python scripts/generate_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./data/output

      - name: Deploy to GitHub Pages
        id: deployment
        #uses: actions/deploy-pages@v4
        # 这一步是核心：触发 GitHub Pages 正式部署
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data/output
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Send success notification (optional)
        if: success()
        run: |
          echo "Daily crawl completed successfully at $(date)"
          # Add webhook notification here if desired

      - name: Send failure notification (optional)
        if: failure()
        run: |
          echo "Daily crawl failed at $(date)"
          # Add webhook notification here if desired
